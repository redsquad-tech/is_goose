name: Bundle Desktop (Windows)

on:
  workflow_dispatch:
    inputs:
      goosed_version:
        description: 'Tag of redsquad-tech/is_goosed release to bundle (for example v0.1)'
        required: false
        default: 'v0.1'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/bundle-desktop-windows.yml'
      - 'forge.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - 'vite*.mts'
      - 'src/**'
      - 'scripts/**'

jobs:
  build-desktop-windows:
    name: Build Desktop (Windows)
    runs-on: windows-latest
    permissions:
      contents: read
    env:
      GOOSED_REPOSITORY: redsquad-tech/is_goosed
      GOOSED_VERSION: ${{ github.event.inputs.goosed_version || vars.GOOSED_VERSION || 'v0.1' }}
      GOOSED_WINDOWS_ASSET: goosed-windows-x86_64.zip

    steps:
      - name: Checkout desktop repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.10.0
          cache: npm

      - name: Install desktop dependencies
        shell: bash
        run: npm ci

      - name: Download bundled goosed release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.IS_GOOSED_RELEASE_TOKEN || github.token }}
        run: |
          Write-Host "Downloading ${env:GOOSED_WINDOWS_ASSET} from ${env:GOOSED_REPOSITORY} release ${env:GOOSED_VERSION}"

          Remove-Item vendor/goosed-release -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item src/bin/goosed.exe -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path vendor/goosed-release | Out-Null
          New-Item -ItemType Directory -Force -Path src/bin | Out-Null

          gh release download ${env:GOOSED_VERSION} `
            --repo ${env:GOOSED_REPOSITORY} `
            --pattern ${env:GOOSED_WINDOWS_ASSET} `
            --dir vendor/goosed-release

          if (-not (Test-Path "vendor/goosed-release/${env:GOOSED_WINDOWS_ASSET}")) {
            throw "Release asset download failed. For a private backend repository, configure the IS_GOOSED_RELEASE_TOKEN GitHub Actions secret with read access to ${env:GOOSED_REPOSITORY}."
          }

          Expand-Archive -Path "vendor/goosed-release/${env:GOOSED_WINDOWS_ASSET}" -DestinationPath "vendor/goosed-release/unpacked" -Force

          $goosed = Get-ChildItem "vendor/goosed-release/unpacked" -Recurse -Filter "goosed.exe" | Select-Object -First 1
          if (-not $goosed) {
            throw "goosed.exe was not found inside the downloaded release archive"
          }

          Copy-Item $goosed.FullName "src/bin/goosed.exe" -Force
          Get-ChildItem src/bin

      - name: Create goosed runtime env
        shell: pwsh
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOSE_PROVIDER: ${{ vars.GOOSE_PROVIDER }}
          GOOSE_MODEL: ${{ vars.GOOSE_MODEL }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:OPENAI_API_KEY)) {
            throw "GitHub Actions secret OPENAI_API_KEY is required for the Windows bundle."
          }
          if ([string]::IsNullOrWhiteSpace($env:GOOSE_PROVIDER)) {
            throw "GitHub Actions variable GOOSE_PROVIDER is required for the Windows bundle."
          }
          if ([string]::IsNullOrWhiteSpace($env:GOOSE_MODEL)) {
            throw "GitHub Actions variable GOOSE_MODEL is required for the Windows bundle."
          }

          New-Item -ItemType Directory -Force -Path src/bin | Out-Null
          @(
            "GOOSE_PROVIDER=$($env:GOOSE_PROVIDER)"
            "GOOSE_MODEL=$($env:GOOSE_MODEL)"
            "OPENAI_API_KEY=$($env:OPENAI_API_KEY)"
          ) | Set-Content -Path "src/bin/goosed.env"

      - name: Install WiX Toolset
        shell: pwsh
        run: |
          choco install wixtoolset --no-progress -y
          candle.exe -?
          light.exe -?

      - name: Prepare Windows desktop assets
        shell: bash
        run: |
          node scripts/prepare-platform-binaries.js win32
          if [ -d src/bin ]; then
            ls -la src/bin
          fi

      - name: Build Windows desktop bundle
        shell: bash
        run: npm run bundle:windows

      - name: Verify frontend bundle output
        shell: bash
        run: |
          test -f out/Goose-win32-x64/Goose.exe
          test -f out/make/wix/x64/Goose.msi
          test -f out/Goose-win32-x64/resources/bin/goosed.exe
          test -f out/Goose-win32-x64/resources/bin/goosed.env
          if [ -d out/Goose-win32-x64/resources/bin ]; then
            ls -la out/Goose-win32-x64/resources/bin
          fi
          ls -la out/make/wix/x64

      - name: Create Windows archive
        shell: pwsh
        run: |
          if (Test-Path Goose-win32-x64.zip) {
            Remove-Item Goose-win32-x64.zip -Force
          }
          Compress-Archive -Path out/Goose-win32-x64/* -DestinationPath Goose-win32-x64.zip

      - name: Copy MSI to root
        shell: bash
        run: cp -f out/make/wix/x64/Goose.msi Goose.msi

      - name: Upload Windows build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Goose-win32-x64
          path: Goose-win32-x64.zip

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: Goose-msi-x64
          path: Goose.msi
