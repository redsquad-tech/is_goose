name: Bundle Desktop (Windows)

on:
  workflow_dispatch:
    inputs:
      goosed_version:
        description: 'Tag of redsquad-tech/is_goosed release to bundle (for example v0.3). Leave empty to use repo variable or latest release.'
        required: false
        default: ''
  push:
    branches:
      - main
    paths:
      - '.github/workflows/bundle-desktop-windows.yml'
      - 'forge.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - 'vite*.mts'
      - 'src/**'
      - 'scripts/**'

jobs:
  build-desktop-windows:
    name: Build Desktop (Windows)
    runs-on: windows-latest
    permissions:
      contents: read
    env:
      GOOSED_REPOSITORY: redsquad-tech/is_goosed
      GOOSED_WINDOWS_ASSET: goosed-windows-x86_64.zip

    steps:
      - name: Checkout desktop repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.10.0
          cache: npm

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: 'x64'

      - name: Install desktop dependencies
        shell: bash
        run: npm ci

      - name: Resolve bundled goosed version
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.IS_GOOSED_RELEASE_TOKEN || github.token }}
          INPUT_VERSION: ${{ github.event.inputs.goosed_version }}
          REPO_VERSION: ${{ vars.GOOSED_VERSION }}
        run: |
          $resolvedVersion = "${env:INPUT_VERSION}".Trim()
          if (-not $resolvedVersion) {
            $resolvedVersion = "${env:REPO_VERSION}".Trim()
          }

          if (-not $resolvedVersion) {
            Write-Host "No explicit goosed version provided, resolving latest release from ${env:GOOSED_REPOSITORY}"
            $resolvedVersion = gh release view --repo ${env:GOOSED_REPOSITORY} --json tagName --jq ".tagName"
          }

          if (-not $resolvedVersion) {
            throw "Failed to resolve goosed release tag"
          }

          Write-Host "Using goosed release tag: $resolvedVersion"
          "GOOSED_VERSION=$resolvedVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Download bundled goosed release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.IS_GOOSED_RELEASE_TOKEN || github.token }}
        run: |
          Write-Host "Downloading ${env:GOOSED_WINDOWS_ASSET} from ${env:GOOSED_REPOSITORY} release ${env:GOOSED_VERSION}"

          Remove-Item vendor/goosed-release -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item src/bin/goosed.exe -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path vendor/goosed-release | Out-Null
          New-Item -ItemType Directory -Force -Path src/bin | Out-Null

          gh release download ${env:GOOSED_VERSION} `
            --repo ${env:GOOSED_REPOSITORY} `
            --pattern ${env:GOOSED_WINDOWS_ASSET} `
            --dir vendor/goosed-release

          if (-not (Test-Path "vendor/goosed-release/${env:GOOSED_WINDOWS_ASSET}")) {
            throw "Release asset download failed. For a private backend repository, configure the IS_GOOSED_RELEASE_TOKEN GitHub Actions secret with read access to ${env:GOOSED_REPOSITORY}."
          }

          Expand-Archive -Path "vendor/goosed-release/${env:GOOSED_WINDOWS_ASSET}" -DestinationPath "vendor/goosed-release/unpacked" -Force

          $goosed = Get-ChildItem "vendor/goosed-release/unpacked" -Recurse -Filter "goosed.exe" | Select-Object -First 1
          if (-not $goosed) {
            throw "goosed.exe was not found inside the downloaded release archive"
          }

          Copy-Item $goosed.FullName "src/bin/goosed.exe" -Force
          Get-ChildItem src/bin

      - name: Build bundled web search CLI tools
        shell: pwsh
        run: |
          Write-Host "Building ddg-search.exe"

          $gopath = (go env GOPATH).Trim()
          if (-not $gopath) {
            throw "go env GOPATH returned empty value"
          }

          go install github.com/Djarvur/ddg-search/cmd/ddg-search@latest

          $ddgSearch = Join-Path $gopath "bin/ddg-search.exe"

          if (-not (Test-Path $ddgSearch)) {
            throw "ddg-search.exe was not produced at $ddgSearch"
          }

          Copy-Item $ddgSearch "src/bin/ddg-search.exe" -Force
          Get-ChildItem src/bin

      - name: Build bundled Crawl4AI runtime
        shell: pwsh
        run: |
          Write-Host "Building bundled Python runtime with Crawl4AI"

          $pythonExe = (Get-Command python).Source
          if (-not $pythonExe) {
            throw "python executable not found after setup-python"
          }

          $pythonRoot = Split-Path $pythonExe -Parent
          $runtimeDir = "src/bin/python-runtime"
          $browserDir = "src/bin/ms-playwright"

          Remove-Item $runtimeDir -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item $browserDir -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path "src/bin" | Out-Null
          New-Item -ItemType Directory -Force -Path $browserDir | Out-Null

          Copy-Item $pythonRoot $runtimeDir -Recurse -Force

          & "$runtimeDir/python.exe" -m pip install --upgrade pip
          & "$runtimeDir/python.exe" -m pip install "crawl4ai==0.8.6" "markitdown[all]==0.1.5"

          $resolvedBrowserDir = (Resolve-Path $browserDir).Path
          $env:PLAYWRIGHT_BROWSERS_PATH = $resolvedBrowserDir
          $env:PATCHRIGHT_BROWSERS_PATH = $resolvedBrowserDir

          & "$runtimeDir/python.exe" -m playwright install chromium
          & "$runtimeDir/python.exe" -m patchright install chromium

          Get-ChildItem src/bin

      - name: Build bundled OCR runtime (Tesseract + Poppler)
        shell: pwsh
        run: |
          Write-Host "Building bundled OCR runtime with Tesseract and pdftoppm"

          choco install tesseract poppler --no-progress -y

          $ocrDir = "src/bin/ocr-runtime"
          Remove-Item $ocrDir -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $ocrDir | Out-Null

          $tesseractExeCandidates = @(
            "C:\Program Files\Tesseract-OCR\tesseract.exe",
            "${env:ProgramFiles}\Tesseract-OCR\tesseract.exe",
            "${env:ProgramFiles(x86)}\Tesseract-OCR\tesseract.exe"
          )
          $tesseractExe = $tesseractExeCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $tesseractExe) {
            $tesseractExe = (Get-ChildItem "C:\ProgramData\chocolatey\lib" -Recurse -Filter "tesseract.exe" -ErrorAction SilentlyContinue | Select-Object -First 1).FullName
          }
          if (-not $tesseractExe) {
            throw "Unable to locate tesseract.exe after installation"
          }

          $tesseractDir = Split-Path $tesseractExe -Parent
          Copy-Item "$tesseractDir\*" $ocrDir -Recurse -Force

          $pdftoppmExe = (Get-ChildItem "C:\ProgramData\chocolatey\lib" -Recurse -Filter "pdftoppm.exe" -ErrorAction SilentlyContinue | Select-Object -First 1).FullName
          if (-not $pdftoppmExe) {
            $pdftoppmCommand = Get-Command pdftoppm -ErrorAction SilentlyContinue
            if ($pdftoppmCommand) {
              $pdftoppmExe = $pdftoppmCommand.Source
            }
          }
          if (-not $pdftoppmExe) {
            throw "Unable to locate pdftoppm.exe after installation"
          }

          $popplerBinDir = Split-Path $pdftoppmExe -Parent
          Copy-Item "$popplerBinDir\*" $ocrDir -Recurse -Force

          if (-not (Test-Path "$ocrDir\tesseract.exe")) {
            throw "Bundled OCR runtime is missing tesseract.exe"
          }
          if (-not (Test-Path "$ocrDir\pdftoppm.exe")) {
            throw "Bundled OCR runtime is missing pdftoppm.exe"
          }
          if (-not (Test-Path "$ocrDir\tessdata\eng.traineddata")) {
            throw "Bundled OCR runtime is missing tessdata/eng.traineddata"
          }

          Get-ChildItem $ocrDir

      - name: Install WiX Toolset
        shell: pwsh
        run: |
          choco install wixtoolset --no-progress -y
          candle.exe -?
          light.exe -?

      - name: Prepare Windows desktop assets
        shell: bash
        run: |
          node scripts/prepare-platform-binaries.js win32
          if [ -d src/bin ]; then
            ls -la src/bin
          fi

      - name: Build Windows desktop bundle
        shell: bash
        run: npm run bundle:windows

      - name: Verify frontend bundle output
        shell: bash
        run: |
          test -f out/Insightstream-win32-x64/Insightstream.exe
          test -f out/make/wix/x64/Insightstream.msi
          test -f out/Insightstream-win32-x64/resources/bin/goosed.exe
          test -f out/Insightstream-win32-x64/resources/bin/ddg-search.exe
          test -f out/Insightstream-win32-x64/resources/bin/crwl.cmd
          test -f out/Insightstream-win32-x64/resources/bin/markitdown.cmd
          test -f out/Insightstream-win32-x64/resources/bin/ocr-runtime/tesseract.exe
          test -f out/Insightstream-win32-x64/resources/bin/ocr-runtime/pdftoppm.exe
          test -f out/Insightstream-win32-x64/resources/bin/ocr-runtime/tessdata/eng.traineddata
          test -f out/Insightstream-win32-x64/resources/bin/python-runtime/python.exe
          test -d out/Insightstream-win32-x64/resources/bin/ms-playwright
          if [ -d out/Insightstream-win32-x64/resources/bin ]; then
            ls -la out/Insightstream-win32-x64/resources/bin
          fi
          ls -la out/make/wix/x64

      - name: Create Windows archive
        shell: pwsh
        run: |
          if (Test-Path Insightstream-win32-x64.zip) {
            Remove-Item Insightstream-win32-x64.zip -Force
          }
          Compress-Archive -Path out/Insightstream-win32-x64/* -DestinationPath Insightstream-win32-x64.zip

      - name: Copy MSI to root
        shell: bash
        run: cp -f out/make/wix/x64/Insightstream.msi Insightstream.msi

      - name: Upload Windows build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Insightstream-win32-x64
          path: Insightstream-win32-x64.zip

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: Insightstream-msi-x64
          path: Insightstream.msi
